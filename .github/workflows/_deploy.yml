name: Deploy (reusable)

# This reusable workflow is the single source of deploy logic.
# All environment-specific deploy workflows call this one.
#
# To use a different hosting provider, only update this file.

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment (dev | staging | production)
        required: true
        type: string
      node_env:
        description: NODE_ENV value for the server build
        required: true
        type: string
    secrets:
      RENDER_SERVER_DEPLOY_HOOK:
        required: true
      RENDER_CLIENT_DEPLOY_HOOK:
        required: true
      MONGODB_URI:
        required: true
      JWT_SECRET:
        required: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build feature-flags
        run: npm run build --workspace=feature-flags

      - name: Build server
        run: npm run build --workspace=packages/server
        env:
          NODE_ENV: ${{ inputs.node_env }}

      - name: Build client
        run: npm run build --workspace=packages/client
        env:
          VITE_API_URL: ${{ vars.API_URL }}

      - name: Deploy server to Render
        run: |
          echo "Triggering Render server deploy for ${{ inputs.environment }}..."
          curl -fsS --retry 3 -X POST "${{ secrets.RENDER_SERVER_DEPLOY_HOOK }}"
          echo "Server deploy triggered."

      - name: Deploy client to Render
        run: |
          echo "Triggering Render client deploy for ${{ inputs.environment }}..."
          curl -fsS --retry 3 -X POST "${{ secrets.RENDER_CLIENT_DEPLOY_HOOK }}"
          echo "Client deploy triggered."

      - name: Health check (server)
        run: |
          echo "Waiting 30 seconds for deploy to propagate..."
          sleep 30
          STATUS=$(curl -fsS -o /dev/null -w "%{http_code}" "${{ vars.API_URL }}/health" || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Health check returned $STATUS — deploy may still be in progress."
          else
            echo "✅ Health check passed."
          fi

      - name: Summary
        run: |
          echo "## Deploy to ${{ inputs.environment }} complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **NODE_ENV** | ${{ inputs.node_env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **App URL** | ${{ vars.APP_URL }} |" >> $GITHUB_STEP_SUMMARY
