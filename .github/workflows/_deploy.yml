name: Deploy (reusable)

# This reusable workflow is the single source of deploy logic.
# All environment-specific deploy workflows call this one.
#
# Hosting: Railway
# Secrets: managed by dotenv-vault — only RAILWAY_TOKEN is required here.
#
# To switch hosting providers, only update this file.

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name (dev | staging | production)
        required: true
        type: string
      railway_env:
        description: Railway environment name to deploy into (dev | staging | production)
        required: true
        type: string
    secrets:
      RAILWAY_TOKEN:
        description: Railway project token (Settings → Tokens in Railway dashboard)
        required: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Railway builds the Docker image itself via the Dockerfile.
      # No local build step is needed — we just trigger the deploy.

      - name: Deploy server to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Triggering Railway deploy for taskflow-server → ${{ inputs.railway_env }}..."
          npx --yes @railway/cli@latest up \
            --service taskflow-server \
            --environment ${{ inputs.railway_env }} \
            --detach
          echo "Server deploy triggered."

      - name: Deploy client to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Triggering Railway deploy for taskflow-client → ${{ inputs.railway_env }}..."
          npx --yes @railway/cli@latest up \
            --service taskflow-client \
            --environment ${{ inputs.railway_env }} \
            --detach
          echo "Client deploy triggered."

      - name: Health check (server)
        run: |
          echo "Waiting 90 seconds for Railway to build and start the container..."
          sleep 90
          STATUS=$(curl -fsS -o /dev/null -w "%{http_code}" "${{ vars.SERVER_URL }}/health" || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Health check returned $STATUS — deploy may still be in progress."
          else
            echo "✅ Health check passed."
          fi

      - name: Summary
        run: |
          echo "## Deploy to ${{ inputs.environment }} complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Railway env** | ${{ inputs.railway_env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Client URL** | ${{ vars.CLIENT_URL }} |" >> $GITHUB_STEP_SUMMARY
