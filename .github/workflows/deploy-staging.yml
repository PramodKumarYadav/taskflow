name: Deploy → Staging

# Manual promotion. Specify the commit SHA to deploy (defaults to HEAD of main).
# Typical use: after QA in dev signs off, engineer manually runs this workflow.
on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA to deploy (defaults to HEAD of main)
        required: false
        default: ''

jobs:
  checkout-sha:
    name: Resolve SHA
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - id: resolve
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            git checkout ${{ inputs.sha }}
          fi
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  deploy-staging:
    needs: checkout-sha
    name: Deploy to Staging
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: staging
      railway_env: staging
      sha: ${{ needs.checkout-sha.outputs.sha }}
    secrets:
      # Set in GitHub → Settings → Environments → staging → Secrets
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
