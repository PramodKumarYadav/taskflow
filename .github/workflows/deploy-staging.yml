name: Deploy → Staging

# Manual promotion. Specify the commit SHA to deploy (defaults to HEAD of main).
# Typical use: after QA in dev signs off, engineer manually runs this workflow.
on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA to deploy (defaults to HEAD of main)
        required: false
        default: ''

jobs:
  checkout-sha:
    name: Resolve SHA
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.ref }}
      - id: resolve
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  deploy-staging:
    needs: checkout-sha
    name: Deploy to Staging
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: staging
      railway_env: staging
    secrets:
      # Set in GitHub → Settings → Environments → staging → Secrets
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  notify-pr:
    needs: [checkout-sha, deploy-staging]
    name: Comment on PR
    runs-on: ubuntu-latest
    if: ${{ always() }}
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ needs.checkout-sha.outputs.sha }}';
            const status = '${{ needs.deploy-staging.result }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const body = `${emoji} **Staging deploy** ${status} for \`${sha.slice(0,7)}\`\n\nEnvironment: staging | [View app](${{ vars.CLIENT_URL }})`;

            // Find the PR associated with this SHA
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });

            for (const pr of prs.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
