name: Deploy → Dev

# Fires automatically on every merge to main (trunk-based delivery).
# Deploys to the Railway "dev" environment.
on:
  push:
    branches: [main]

jobs:
  deploy-dev:
    name: Deploy to Dev
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: ci
      railway_env: ci
    secrets:
      # Set in GitHub → Settings → Environments → dev → Secrets
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
