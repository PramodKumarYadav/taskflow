name: Deploy → Dev

# Fires automatically on every merge to main (trunk-based delivery)
on:
  push:
    branches: [main]

jobs:
  deploy-dev:
    name: Deploy to Dev
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: dev
      node_env: development
    secrets:
      # Set these in GitHub → Settings → Secrets → Actions
      # RENDER_SERVER_DEPLOY_HOOK: your Render server deploy hook URL
      # RENDER_CLIENT_DEPLOY_HOOK: your Render client deploy hook URL
      RENDER_SERVER_DEPLOY_HOOK: ${{ secrets.RENDER_DEV_SERVER_HOOK }}
      RENDER_CLIENT_DEPLOY_HOOK: ${{ secrets.RENDER_DEV_CLIENT_HOOK }}
      MONGODB_URI: ${{ secrets.DEV_MONGODB_URI }}
      JWT_SECRET: ${{ secrets.DEV_JWT_SECRET }}
